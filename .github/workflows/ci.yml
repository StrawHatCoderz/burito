name: CI

on:
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend — build & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: gradle

      - name: Build
        working-directory: backend
        run: ./gradlew bootJar --no-daemon

      - name: Test
        working-directory: backend
        run: ./gradlew test --no-daemon

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-results
          path: |
            backend/build/test-results/test/
            backend/build/reports/tests/test/

  frontend:
    name: Frontend — validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate placeholder exists
        run: test -f frontend/index.html

  lint:
    name: Lint — Checkstyle
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: gradle

      - name: Checkstyle
        working-directory: backend
        run: ./gradlew checkstyleMain --no-daemon

      - name: Upload Checkstyle report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: checkstyle-report
          path: backend/build/reports/checkstyle/
